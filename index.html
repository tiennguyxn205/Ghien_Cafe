<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghiền Cafe | Menu Đa Dạng - Đậm Vị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-900 tracking-tighter cursor-pointer" onclick="window.scrollTo(0,0)">
                <i class="fa-solid fa-mug-hot mr-2"></i>GHIỀN CAFE
            </h1>
            <div class="flex items-center gap-6">
                <a href="#menu" class="hidden md:block hover:text-orange-700 font-semibold">Menu</a>
                <div class="relative cursor-pointer group" onclick="document.getElementById('cart-section').scrollIntoView({behavior: 'smooth'})">
                    <i class="fa-solid fa-cart-shopping text-2xl text-orange-800 group-hover:scale-110 transition"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-[url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000')] bg-cover bg-center h-[400px] relative flex items-center justify-center text-center px-6">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative z-10 text-white">
            <h2 class="text-5xl font-extrabold mb-4 drop-shadow-lg">Thưởng Thức Vị Nguyên Bản</h2>
            <p class="text-xl text-orange-100 max-w-2xl mx-auto">Từ những hạt cafe được tuyển chọn kỹ lưỡng, mang đến cho bạn năng lượng tích cực mỗi ngày.</p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12" id="menu">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
            <h3 class="text-3xl font-bold text-stone-900">Danh Mục Đồ Uống</h3>
            <div class="bg-white px-4 py-2 rounded-full border border-stone-200 flex items-center w-full md:w-64 shadow-sm">
                <i class="fa-solid fa-magnifying-glass text-stone-400 mr-2"></i>
                <input type="text" placeholder="Tìm món bạn thích..." class="bg-transparent outline-none w-full text-sm">
            </div>
        </div>

        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-24 items-start">
            <section id="cart-section" class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold flex items-center">
                        <i class="fa-solid fa-receipt mr-3 text-orange-700"></i> Đơn hàng
                    </h3>
                    <button onclick="clearCart()" class="text-sm text-stone-400 hover:text-red-500">Xóa tất cả</button>
                </div>
                
                <div id="cart-items" class="space-y-6 mb-8 min-h-[100px]">
                    </div>

                <div class="border-t pt-6 space-y-2 text-stone-600">
                    <div class="flex justify-between font-medium">
                        <span>Tạm tính:</span>
                        <span id="sub-total">0 VNĐ</span>
                    </div>
                    <div class="flex justify-between font-bold text-2xl text-stone-900">
                        <span>Tổng cộng:</span>
                        <span id="total-price" class="text-orange-700">0 VNĐ</span>
                    </div>
                </div>
            </section>

            <section class="bg-orange-900 p-8 rounded-3xl text-white shadow-2xl sticky top-24">
                <h3 class="text-2xl font-bold mb-6">Thông tin giao hàng</h3>
                <form class="space-y-4">
                    <div>
                        <label class="text-xs text-orange-200 uppercase font-bold px-1">Tên khách hàng</label>
                        <input type="text" id="name" placeholder="Nguyễn Văn A" class="w-full p-4 mt-1 rounded-xl bg-orange-800 border-none text-white placeholder:text-orange-300 focus:ring-2 focus:ring-orange-400 outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-orange-200 uppercase font-bold px-1">Địa chỉ nhận</label>
                        <input type="text" id="address" placeholder="123 Đường ABC, Quận..." class="w-full p-4 mt-1 rounded-xl bg-orange-800 border-none text-white placeholder:text-orange-300 focus:ring-2 focus:ring-orange-400 outline-none">
                    </div>
                    <button type="button" onclick="checkout()" class="w-full bg-white text-orange-900 hover:bg-orange-100 font-extrabold py-5 rounded-xl transition duration-300 shadow-lg mt-4 uppercase tracking-wider">
                        Đặt Hàng Ngay
                    </button>
                </form>
            </section>
        </div>
    </main>

    <footer class="bg-white border-t border-stone-200 py-12 text-center">
        <div class="container mx-auto px-6">
            <h4 class="text-xl font-bold text-orange-900 mb-4 tracking-tighter">☕ GHIỀN CAFE</h4>
            <div class="flex justify-center gap-6 mb-8 text-stone-500">
                <i class="fa-brands fa-facebook text-xl hover:text-blue-600 cursor-pointer"></i>
                <i class="fa-brands fa-instagram text-xl hover:text-pink-600 cursor-pointer"></i>
                <i class="fa-brands fa-tiktok text-xl hover:text-black cursor-pointer"></i>
            </div>
            <p class="text-stone-400 text-sm">© 2024 Ghiền Cafe Online. Giao hàng nhanh trong 30 phút.</p>
        </div>
    </footer>

    <script>
        // Database 13 món Cafe
        const products = [
            { id: 1, name: "Cafe Đen Đá", price: 25000, img: "https://quangtanhoa.com/wp-content/uploads/2018/01/ca-phe-den-da.jpg" },
            { id: 2, name: "Cafe Sữa Đá", price: 29000, img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400" },
            { id: 3, name: "Bạc Xỉu Sài Gòn", price: 35000, img: "https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?w=400" },
            { id: 4, name: "Cafe Muối", price: 39000, img: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=400" },
            { id: 5, name: "Cafe Trứng Hà Nội", price: 45000, img: "https://cdn.tgdd.vn/Files/2021/12/10/1403710/10-quan-cafe-trung-ha-noi-chuan-vi-nhat-ma-gia-ca-lai-phai-chang-202112111016024916.jpg" },
            { id: 6, name: "Espresso Single", price: 32000, img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=400" },
            { id: 7, name: "Cappuccino Ý", price: 49000, img: "https://images.unsplash.com/photo-1534778101976-62847782c213?w=400" },
            { id: 8, name: "Caramel Latte", price: 55000, img: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=400" },
            { id: 9, name: "Mocha Hạnh Nhân", price: 59000, img: "https://cafedidong.vn/wp-content/uploads/2018/05/CAFEDIDONG-WHITE-MOCHA-1-scaled.jpg.webp" },
            { id: 10, name: "Cold Brew Cam Sả", price: 45000, img: "https://cdnphoto.dantri.com.vn/RdxQLXEkWn3058BOGiLq4HMNPOM=/2021/03/31/cold-brew-cam-sadocx-1617133126446.jpeg" },
            { id: 11, name: "Cafe Cốt Dừa Đá Xay", price: 55000, img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400" },
            { id: 12, name: "Americano Đá", price: 35000, img: "https://robanme.com/wp-content/uploads/2024/08/keurig-1-1-768x576.jpg" },
            { id: 13, name: "Flat White", price: 49000, img: "https://images.unsplash.com/photo-1577968897966-3d4325b36b61?w=400" }
        ];

        let cart = JSON.parse(localStorage.getItem('coffee_cart_v2')) || [];

        function renderProducts() {
            const productDiv = document.getElementById('product-list');
            productDiv.innerHTML = products.map(p => `
                <div class="product-card group bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-stone-100">
                    <div class="relative overflow-hidden h-48">
                        <img src="${p.img}" class="w-full h-full object-cover transition duration-500" alt="${p.name}">
                        <div class="absolute top-3 right-3 bg-white/90 px-3 py-1 rounded-full text-xs font-bold text-orange-900 shadow-sm border border-orange-100">
                            Hạt Arabica
                        </div>
                    </div>
                    <div class="p-5">
                        <h4 class="text-lg font-bold mb-1 text-stone-800">${p.name}</h4>
                        <p class="text-orange-700 font-black text-xl mb-4">${p.price.toLocaleString()}đ</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-stone-900 text-white font-bold py-3 rounded-2xl hover:bg-orange-800 transition shadow-md shadow-stone-200">
                            Thêm vào giỏ
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push({...product, cartId: Date.now()});
            saveAndRender();
        }

        function removeItem(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            saveAndRender();
        }

        function clearCart() {
            if(confirm("Bạn muốn làm mới giỏ hàng?")) {
                cart = [];
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('coffee_cart_v2', JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
            const cartDiv = document.getElementById('cart-items');
            const totalDiv = document.getElementById('total-price');
            const subTotalDiv = document.getElementById('sub-total');
            const countDiv = document.getElementById('cart-count');

            countDiv.innerText = cart.length;
            
            if (cart.length === 0) {
                cartDiv.innerHTML = `
                    <div class="text-center py-10">
                        <i class="fa-solid fa-mug-hot text-4xl text-stone-200 mb-3"></i>
                        <p class="text-stone-400">Đang khát quá, đặt cafe thôi!</p>
                    </div>`;
            } else {
                cartDiv.innerHTML = cart.map((item) => `
                    <div class="flex justify-between items-center group animate-fadeIn">
                        <div class="flex items-center gap-4">
                            <img src="${item.img}" class="w-16 h-16 object-cover rounded-2xl shadow-sm">
                            <div>
                                <p class="font-bold text-stone-800">${item.name}</p>
                                <p class="text-sm text-stone-400">${item.price.toLocaleString()} VNĐ</p>
                            </div>
                        </div>
                        <button onclick="removeItem(${item.cartId})" class="p-2 text-stone-300 hover:text-red-500 transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalDiv.innerText = `${total.toLocaleString()} VNĐ`;
            subTotalDiv.innerText = `${total.toLocaleString()} VNĐ`;
        }

        async function checkout() {
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;

            if (cart.length === 0) {
                alert("Bạn chưa chọn món nào cả!");
                return;
            }
            if (!name || !address) {
                alert("Vui lòng nhập tên và địa chỉ để quán giao cafe nhé!");
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Giả lập lưu vào Database
            console.log("SENDING TO DB:", { customer: name, address, order: cart, total });
            
            alert(`☕ Đang chuẩn bị đơn hàng cho ${name}!\n💰 Tổng cộng: ${total.toLocaleString()}đ\n📍 Giao tới: ${address}`);
            
            cart = [];
            saveAndRender();
        }

        // Initialize
        renderProducts();
        renderCart();
    </script>
</body>
</html>
